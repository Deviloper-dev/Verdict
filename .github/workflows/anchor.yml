# Public anchoring: commits each group's chain head + full export to this repo
# on a schedule. Once a head hash is in the public commit history, nobody —
# including the DB owner — can rewrite records older than the last anchor
# without the mismatch being visible to every group member.
#
# Repo secrets required:
#   APP_URL              e.g. https://verdict-yourname.vercel.app
#   ANCHOR_EXPORT_TOKEN  same value as the Vercel env var

name: anchor-chain

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  anchor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch export
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.ANCHOR_EXPORT_TOKEN }}" \
            "${{ secrets.APP_URL }}/api/anchor-export" > /tmp/export.json

      - name: Split into per-group anchor + export files
        run: |
          for gid in $(jq -r '.groups[].group_id' /tmp/export.json); do
            mkdir -p "anchors/$gid"
            jq --arg gid "$gid" \
              '.groups[] | select(.group_id == $gid) | {group_id, group_name, seq: .head_seq, this_hash: .head_hash} + {anchored_at: now | todate}' \
              /tmp/export.json > "anchors/$gid/latest.json"
            jq --arg gid "$gid" '.groups[] | select(.group_id == $gid)' \
              /tmp/export.json > "anchors/$gid/export.json"
          done

      - name: Commit if changed
        run: |
          git config user.name "verdict-anchor[bot]"
          git config user.email "anchor@users.noreply.github.com"
          git add anchors/
          if git diff --cached --quiet; then
            echo "No chain movement since last anchor."
          else
            git commit -m "anchor: chain heads $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
